# 导入所需依赖库
import pymysql
import random
import json
from datetime import datetime

# ===================== 数据库全局配置 =====================
DB_CONFIG = {
    "host": "localhost",
    "user": "root",       # 替换为自己的MySQL用户名
    "password": "123456", # 替换为自己的MySQL密码
    "database": "online_learn",
    "charset": "utf8mb4"
}

# 通用数据库连接类
class DBConnect:
    def __init__(self):
        self.conn = pymysql.connect(**DB_CONFIG)
        self.cursor = self.conn.cursor(pymysql.cursors.DictCursor)

    # 通用查询方法
    def query(self, sql, params=None):
        self.cursor.execute(sql, params or [])
        return self.cursor.fetchall()

    # 通用增删改方法
    def execute(self, sql, params=None):
        try:
            self.cursor.execute(sql, params or [])
            self.conn.commit()
            return True
        except Exception as e:
            self.conn.rollback()
            print(f"数据库操作失败：{e}")
            return False

    # 关闭连接
    def close(self):
        self.cursor.close()
        self.conn.close()

# ===================== 公共工具函数 =====================
# 生成6位随机班级进班码（数字+字母）
def create_class_code():
    chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    return "".join(random.sample(chars, 6))

# ===================== 用户模块（注册/登录/权限） =====================
class UserService:
    def __init__(self):
        self.db = DBConnect()

    # 用户注册：1管理员 2教师 3学员
    def register(self, username, password, role, real_name="", phone="", email=""):
        sql = """
        INSERT INTO `user`(username, password, role, real_name, phone, email)
        VALUES(%s, %s, %s, %s, %s, %s)
        """
        return self.db.execute(sql, [username, password, role, real_name, phone, email])

    # 用户登录校验
    def login(self, username, password):
        sql = """
        SELECT user_id, username, role, real_name FROM `user`
        WHERE username=%s AND password=%s
        """
        res = self.db.query(sql, [username, password])
        return res[0] if res else None

    # 根据用户ID获取用户信息
    def get_user_by_id(self, user_id):
        sql = "SELECT * FROM `user` WHERE user_id=%s"
        res = self.db.query(sql, [user_id])
        return res[0] if res else None

# ===================== 教师核心模块（班级/课程/考试/题库） =====================
class TeacherService:
    def __init__(self, teacher_id):
        self.db = DBConnect()
        self.teacher_id = teacher_id

    # 1. 创建班级，自动生成唯一进班码
    def create_class(self, class_name, class_desc=""):
        # 循环生成唯一进班码
        while True:
            code = create_class_code()
            check_sql = "SELECT class_id FROM class WHERE class_code=%s"
            if not self.db.query(check_sql, [code]):
                break
        # 插入班级数据
        sql = """
        INSERT INTO class(class_name, class_code, class_desc, teacher_id)
        VALUES(%s, %s, %s, %s)
        """
        return self.db.execute(sql, [class_name, code, class_desc, self.teacher_id])

    # 2. 创建课程并绑定班级
    def create_course(self, course_name, class_id, course_desc=""):
        sql = """
        INSERT INTO course(course_name, course_desc, class_id, teacher_id)
        VALUES(%s, %s, %s, %s)
        """
        return self.db.execute(sql, [course_name, course_desc, class_id, self.teacher_id])

    # 3. 上传课程学习资料
    def upload_material(self, material_name, material_type, file_path, course_id):
        sql = """
        INSERT INTO material(material_name, material_type, file_path, course_id)
        VALUES(%s, %s, %s, %s)
        """
        return self.db.execute(sql, [material_name, material_type, file_path, course_id])

    # 4. 创建考试
    def create_exam(self, exam_name, course_id, exam_duration, total_score, start_time, end_time):
        sql = """
        INSERT INTO exam(exam_name, course_id, exam_duration, total_score, start_time, end_time, status)
        VALUES(%s, %s, %s, %s, %s, %s, 1)
        """
        return self.db.execute(sql, [exam_name, course_id, exam_duration, total_score, start_time, end_time])

    # 5. 添加五类题型题目（单选/多选/判断/填空/问答）
    def add_question(self, exam_id, question_type, title, options, answer, score):
        # 选项转为JSON存储，适配选择类题型
        options_json = json.dumps(options, ensure_ascii=False) if options else None
        sql = """
        INSERT INTO question(exam_id, question_type, title, options, answer, score)
        VALUES(%s, %s, %s, %s, %s, %s)
        """
        return self.db.execute(sql, [exam_id, question_type, title, options_json, answer, score])

    # 6. 批改学员主观题（填空/问答）
    def correct_subjective_question(self, score_id, final_score):
        sql = """
        UPDATE score SET total_score=%s, correct_status=1 WHERE score_id=%s
        """
        return self.db.execute(sql, [final_score, score_id])

# ===================== 学员核心模块（进班/学习/考试/作答） =====================
class StudentService:
    def __init__(self, student_id):
        self.db = DBConnect()
        self.student_id = student_id

    # 1. 通过进班码加入班级
    def join_class_by_code(self, class_code):
        # 校验进班码
        check_sql = "SELECT class_id FROM class WHERE class_code=%s"
        class_res = self.db.query(check_sql, [class_code])
        if not class_res:
            print("进班码错误，加入班级失败！")
            return False
        class_id = class_res[0]["class_id"]
        # 校验是否已加入该班级
        exist_sql = "SELECT id FROM user_class WHERE user_id=%s AND class_id=%s"
        if self.db.query(exist_sql, [self.student_id, class_id]):
            print("您已加入该班级，无需重复加入！")
            return False
        # 加入班级
        sql = "INSERT INTO user_class(user_id, class_id) VALUES(%s, %s)"
        return self.db.execute(sql, [self.student_id, class_id])

    # 2. 查询我的班级
    def get_my_class(self):
        sql = """
        SELECT c.class_id, c.class_name, c.class_code, c.class_desc
        FROM user_class uc
        JOIN class c ON uc.class_id = c.class_id
        WHERE uc.user_id=%s
        """
        return self.db.query(sql, [self.student_id])

    # 3. 查询班级对应课程及资料
    def get_my_course_material(self, class_id):
        sql = """
        SELECT co.course_id, co.course_name, m.material_name, m.material_type, m.file_path
        FROM course co
        LEFT JOIN material m ON co.course_id = m.course_id
        WHERE co.class_id=%s
        """
        return self.db.query(sql, [class_id])

    # 4. 查询可参加的考试
    def get_my_exam(self):
        sql = """
        SELECT e.exam_id, e.exam_name, e.exam_duration, e.total_score, e.start_time, e.end_time
        FROM exam e
        JOIN course co ON e.course_id = co.course_id
        JOIN user_class uc ON co.class_id = uc.class_id
        WHERE uc.user_id=%s AND e.status=1 AND NOW() BETWEEN e.start_time AND e.end_time
        """
        return self.db.query(sql, [self.student_id])

    # 5. 获取考试所有题目
    def get_exam_question(self, exam_id):
        sql = "SELECT * FROM question WHERE exam_id=%s"
        return self.db.query(sql, [exam_id])

    # 6. 学员提交试卷 + 系统自动批改客观题（单选/多选/判断）
    def submit_exam(self, exam_id, answer_dict):
        # answer_dict: {题目ID: 学员答案}
        questions = self.get_exam_question(exam_id)
        total_score = 0
        subjective_list = []  # 主观题（填空、问答）待批改

        for q in questions:
            q_id = q["question_id"]
            q_type = q["question_type"]
            std_answer = q["answer"].strip()
            stu_answer = answer_dict.get(str(q_id), "").strip()
            q_score = q["score"]

            # 客观题自动批改：1单选 2多选 3判断
            if q_type in [1, 2, 3]:
                if stu_answer == std_answer:
                    total_score += q_score
            # 主观题记录待批改
            else:
                subjective_list.append(q_id)

        # 存储答卷信息
        answer_json = json.dumps(answer_dict, ensure_ascii=False)
        sql = """
        INSERT INTO score(user_id, exam_id, total_score, answer_content, correct_status)
        VALUES(%s, %s, %s, %s, %s)
        ON DUPLICATE KEY UPDATE total_score=%s, answer_content=%s, correct_status=0
        """
        self.db.execute(sql, [self.student_id, exam_id, total_score, answer_json, 0, total_score, answer_json])
        print(f"试卷提交成功！客观题得分：{total_score}，共{len(subjective_list)}道主观题待教师批改")
        return True

    # 7. 查询我的考试成绩
    def get_my_score(self):
        sql = """
        SELECT s.total_score, s.correct_status, s.submit_time, e.exam_name
        FROM score s
        JOIN exam e ON s.exam_id = e.exam_id
        WHERE s.user_id=%s
        """
        return self.db.query(sql, [self.student_id])

